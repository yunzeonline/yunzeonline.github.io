<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进口连接器现货库存查询-TE/Molex/JST连接器-陕西云泽在线科技有限公司</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html{overflow-y:scroll}
body{background:#F5F7FA;color:#333;line-height:1.8;padding-bottom:60px;width:100%;overflow-x:hidden}
.top-banner {background: #004085;color: #fff;padding: 10px 0;box-shadow: 0 2px 6px rgba(0,0,0,0.1);position: relative;}
.banner-inner {max-width:1200px;margin:0 auto;display:flex;align-items:center;padding:0 20px;gap:30px;}
.company-info {display:flex;flex-direction:column;gap:2px;white-space:nowrap;}
.company-name {font-size:20px;font-weight:700;letter-spacing:0.5px;}
.company-slogan {font-size:12px;opacity:0.9;color:#cce0ff;}
.nav {display:flex;gap:0;}
.nav button {background:none;border:none;color:#cce0ff;padding:10px 18px;font-size:15px;cursor:pointer;border-radius:4px 4px 0 0;transition:all 0.2s;}
.nav button.active {background:#0056b3;color:#fff;}
.nav button:hover {background:#0056b3;color:#fff;}
.hamburger {display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;margin-left:auto;}
.mobile-menu {display:none;flex-direction:column;width:100%;position:absolute;top:100%;left:0;background:#004085;z-index:999;}
.mobile-menu button {background:none;border:none;color:#cce0ff;padding:12px 20px;text-align:left;font-size:15px;border-bottom:1px solid #0056b3;cursor:pointer;}
.mobile-menu button.active {background:#0056b3;color:#fff;}
@media (max-width:768px){.nav{display:none;}.hamburger{display:block;}.company-name{font-size:16px;}.company-slogan{display:none;}}
@media (min-width:769px){.mobile-menu{display:none !important;}}
.container{max-width:1200px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:8px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.card h2{font-size:22px;color:#222;margin-bottom:16px}
.page{display:none}
.page.show{display:block}
.table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px;table-layout:fixed}
.table th,.table td{padding:10px 8px;text-align:center;border:1px solid #E2E8F0;word-break:break-all}
.table th{background:#F8FAFC;color:#003366}
#stock .table th:nth-child(1){width:40%}
#stock .table th:nth-child(2){width:20%}
#stock .table th:nth-child(3){width:20%}
#stock .table th:nth-child(4){width:20%}
input{padding:10px;width:100%;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:10px;background:#fff}
textarea{padding:10px;width:100%;border:1px solid #E2E8F0;border-radius:6px;margin-bottom:10px;min-height:100px;resize:vertical;font-size:14px;background:#fff}
button{padding:8px 16px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:0 3px;font-size:14px;transition:all 0.2s}
button:hover{background:#0056b3}
.btn-red{background:#dc3545}
.btn-red:hover{background:#c82333}
.btn-green{background:#28a745}
.btn-green:hover{background:#218838}
.pagination{margin-top:12px;text-align:center}
.search-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:10px}
.search-left{display:flex;align-items:center;gap:8px;flex:1}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.1);z-index:9999;display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:10px;padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #E2E8F0;padding-bottom:8px}
.modal-close{background:none;border:none;font-size:20px;cursor-pointer;color:#666}
.update-time{font-size:14px;color:#666}
.loading-tip{padding:14px;background:#e6f7ff;border-radius:6px;margin-bottom:10px;text-align:center;color:#004085;}
.error-tip{padding:14px;background:#fff2f2;border-radius:6px;margin-bottom:10px;text-align:center;color:#dc3545;}
.footer{background:#343a40;color:#aaa;text-align:center;padding:16px 0;font-size:13px;position:fixed;left:0;right:0;bottom:0}
</style>
</head>
<body>

<div class="top-banner">
  <div class="banner-inner">
    <div class="company-info">
      <div class="company-name">陕西云泽在线科技有限公司</div>
      <div class="company-slogan">进口连接器现货供应链专家</div>
    </div>
    <div class="nav">
      <button class="active" onclick="show('home')">首页</button>
      <button onclick="show('stock')">现货库存</button>
      <button onclick="show('contact')">联系我们</button>
    </div>
    <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <button class="active" onclick="show('home');closeMobileMenu()">首页</button>
    <button onclick="show('stock');closeMobileMenu()">现货库存</button>
    <button onclick="show('contact');closeMobileMenu()">联系我们</button>
  </div>
</div>

<div class="container">
  <div class="page show" id="home">
    <div class="card">
      <h2>欢迎光临陕西云泽在线科技有限公司</h2>
      <p>主营 TE、Molex、JST、Aptiv 等进口连接器现货查询</p>
    </div>
  </div>

  <div class="page" id="stock">
    <div class="card">
      <h2>现货库存查询</h2>
      <div id="load-status"></div>
      <div class="search-row">
        <div class="search-left">
          <label>单型号查询：</label>
          <input id="front-search" placeholder="输入型号搜索(忽略横杠/空格)" oninput="searchStock()" onclick="clearBatchSearchState()" style="flex:1;">
          <button onclick="openBatchSearch()">多料号查询</button>
        </div>
        <div class="update-time" id="update-time">
